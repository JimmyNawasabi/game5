function goToInventory() {
    state.p1.name = document.getElementById('p1-name').value || "Player 1";
    state.p2.name = document.getElementById('p2-name').value || "Player 2";
    state.maxRounds = parseInt(document.getElementById('max-rounds').value) || 5;
    save();
    renderInv();
    document.getElementById('setup-page').style.display = 'none';
    document.getElementById('inventory-page').classList.add('active');
}

function renderInv() {
    const container = document.getElementById('inventory-container');
    container.innerHTML = "";
    for(let cat in state.inventory) {
        let h = `<div class="item-list"><h3>${catNames[cat]}</h3><div id="list-${cat}">`;
        state.inventory[cat].forEach(i => {
            h += `<div class="inventory-item"><span>${i}</span><span class="delete-btn" onclick="removeItem('${cat}', '${i}')">×</span></div>`;
        });
        h += `</div><input type="text" id="add-${cat}" placeholder="Add..." onkeydown="if(event.key==='Enter') addItem('${cat}')"></div>`;
        container.innerHTML += h;
    }
}

function addItem(cat) {
    let val = document.getElementById(`add-${cat}`).value;
    if(!val) return;
    state.inventory[cat].push(val);
    save();
    renderInv();
}

function removeItem(cat, val) {
    state.inventory[cat] = state.inventory[cat].filter(i => i !== val);
    save();
    renderInv();
}

function startGame() {
    state.currentRound = 1;
    state.p1.score = 0;
    state.p2.score = 0;
    state.masterIdx = Math.random() > 0.5 ? 0 : 1;
    state.subIdx = state.masterIdx === 0 ? 1 : 0;
    
    const rt = document.getElementById('realm-toggles');
    rt.innerHTML = "";
    for(let key in realmNames) {
        rt.innerHTML += `<label><input type="checkbox" class="realm-box" value="${key}" checked> ${realmNames[key]}</label>`;
    }
    
    updateUI();
    document.getElementById('inventory-page').style.display = 'none';
    document.getElementById('game-page').classList.add('active');
}

function updateUI() {
    document.getElementById('round-display').innerText = `Round: ${state.currentRound}/${state.maxRounds}`;
    document.getElementById('score-display').innerText = `${state.p1.name}: ${state.p1.score} | ${state.p2.name}: ${state.p2.score}`;
    const master = state.masterIdx === 0 ? state.p1 : state.p2;
    const sub = state.subIdx === 0 ? state.p1 : state.p2;
    document.getElementById('role-display').innerText = `Master: ${master.name} | Submissive: ${sub.name}`;
}

function drawTask() {
    clearInterval(state.timer);
    const realms = Array.from(document.querySelectorAll('.realm-box:checked')).map(b => b.value);
    const r = realms[Math.floor(Math.random() * realms.length)];
    const pool = taskDatabase[r];
    
    // Select base task
    let t = pool[Math.floor(Math.random() * pool.length)];
    let text = t.text;

    // VARIETY INJECTOR: This makes the 50 variations per category
    const modifiers = ["slowly", "viciously", "tenderly", "rhythmically", "with closed eyes", "on the count of three"];
    const locations = ["the inner thigh", "the shoulder blades", "the lower back", "the sensitive front"];
    
    text = text.replace("Master uses", "Master uses " + modifiers[Math.floor(Math.random()*modifiers.length)]);
    text = text.replace("apply to", "apply to " + locations[Math.floor(Math.random()*locations.length)]);

    // Item Injection
    for(let cat in catNames) {
        let items = state.inventory[cat];
        let item = items[Math.floor(Math.random() * items.length)];
        text = text.replace(`[${cat}]`, `<b style="color:var(--gold)">${item}</b>`);
    }

    state.currentTask = { ...t, text: text };
    // UI Update Logic...
    document.getElementById('task-desc').innerHTML = text;
    document.getElementById('timer-display').innerText = format(t.time);
    document.getElementById('master-choice-ui').style.display = 'none';
    document.getElementById('task-ui').style.display = 'block';
    document.getElementById('start-btn').style.display = 'block';
}

function startTimer() {
    let s = state.currentTask.time;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('resolve-controls').style.display = 'flex';
    state.timer = setInterval(() => {
        s--;
        document.getElementById('timer-display').innerText = format(s);
        if(s <= 0) { clearInterval(state.timer); document.getElementById('snd-whip').play(); }
    }, 1000);
}

function resolveTask(success) {
    clearInterval(state.timer);
    if(success) {
        if(state.subIdx === 0) state.p1.score++; else state.p2.score++;
        let t = state.masterIdx; state.masterIdx = state.subIdx; state.subIdx = t;
    } else { if(state.subIdx === 0) state.p1.score--; else state.p2.score--; }
    
    if(state.currentRound >= state.maxRounds) {
        finish();
    } else {
        state.currentRound++;
        document.getElementById('task-ui').style.display = 'none';
        document.getElementById('master-choice-ui').style.display = 'block';
        updateUI();
    }
}

function finish() {
    document.getElementById('game-page').style.display = 'none';
    document.getElementById('final-page').classList.add('active');
    
    const winner = state.p1.score >= state.p2.score ? state.p1 : state.p2;
    document.getElementById('winner-announcement').innerText = `${winner.name.toUpperCase()} IS THE VICTOR`;
    
    let prize = grandPrizes[Math.floor(Math.random() * grandPrizes.length)];
    let text = prize.text;
    for(let cat in catNames) {
        let item = state.inventory[cat][Math.floor(Math.random() * state.inventory[cat].length)];
        text = text.replace(`[${cat}]`, `<b style="color:var(--gold)">${item}</b>`);
    }
    document.getElementById('grand-prize-desc').innerHTML = text;
}

function triggerSafeword() { location.reload(); }
function format(s) { let m = Math.floor(s/60); let rs = s%60; return `${m}:${rs < 10 ? '0'+rs : rs}`; }
