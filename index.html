<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gilded Cage: Ultimate Edition</title>
    <style>
        :root {
            --gold: #d4af37;
            --velvet: #4b0082;
            --deep-grey: #1a1a1a;
            --soft-white: #e0e0e0;
            --accent-red: #8b0000;
            --charcoal: #2b2b2b;
        }

        body {
            background-color: var(--deep-grey);
            color: var(--soft-white);
            font-family: 'Georgia', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 95%;
            max-width: 1000px;
            background: linear-gradient(135deg, var(--charcoal) 0%, #111 100%);
            border: 2px solid var(--gold);
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border-radius: 8px;
        }

        h1, h2, h3 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 3px; margin-top: 0; }
        
        .section { display: none; }
        .active { display: block !important; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-variant: small-caps; }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--gold);
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn {
            background: var(--gold);
            color: #000;
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin: 10px auto;
            width: 250px;
            transition: all 0.3s;
        }

        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-list {
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 4px;
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            margin: 5px 0;
            padding: 5px 10px;
            border-radius: 3px;
        }

        .delete-btn { color: var(--accent-red); cursor: pointer; font-weight: bold; }

        .task-box {
            background: rgba(75, 0, 130, 0.2);
            border-left: 5px solid var(--gold);
            padding: 25px;
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        .timer { font-size: 4rem; text-align: center; color: var(--gold); margin: 20px 0; font-family: monospace; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        input[type="checkbox"] { width: auto; margin-right: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-page" class="section active">
        <h1>The Gilded Cage</h1>
        <div class="input-group">
            <label>Player 1</label>
            <input type="text" id="p1-name" placeholder="Name">
            <select id="p1-gender">
                <option value="male">Penis Owner</option>
                <option value="female">Vulva Owner</option>
            </select>
        </div>
        <div class="input-group">
            <label>Player 2</label>
            <input type="text" id="p2-name" placeholder="Name">
            <select id="p2-gender">
                <option value="male">Penis Owner</option>
                <option value="female">Vulva Owner</option>
            </select>
        </div>
        <div class="input-group">
            <label>Total Rounds</label>
            <input type="number" id="max-rounds" value="5">
        </div>
        <button class="btn" onclick="goToInventory()">Next: Configure Kit</button>
    </div>

    <div id="inventory-page" class="section">
        <h2>Your Arsenal</h2>
        <div id="inventory-container" class="inventory-grid"></div>
        <button class="btn" onclick="startGame()" style="margin-top: 30px;">Lock & Start Game</button>
    </div>

    <div id="game-page" class="section">
        <div class="stats-bar">
            <div id="round-display">Round: 1</div>
            <div id="score-display">Scores</div>
        </div>
        <div id="role-display" style="text-align: center; color: var(--gold); font-size: 1.2rem; margin-bottom: 15px;"></div>
        
        <div id="master-choice-ui">
            <h3>Master's Choice</h3>
            <div id="realm-toggles" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>
            <button class="btn" onclick="drawTask()">Draw Task</button>
        </div>

        <div id="task-ui" style="display:none;">
            <div class="task-box" id="task-desc"></div>
            <div class="timer" id="timer-display">00:00</div>
            <div id="action-controls">
                <button class="btn" id="start-btn" onclick="startTimer()">Start Timer</button>
                <div id="resolve-controls" style="display:none; gap: 10px; justify-content: center; margin-top: 15px;">
                    <button class="btn" onclick="resolveTask(true)" style="background:green; color:white; width: 140px; margin:0;">Success</button>
                    <button class="btn" onclick="resolveTask(false)" style="background:var(--accent-red); color:white; width: 140px; margin:0;">Failure</button>
                </div>
            </div>
            <button class="btn" style="background:#000; color:red; width: 100%; margin-top: 30px; border: 1px solid red;" onclick="triggerSafeword()">SAFEWORD</button>
        </div>
    </div>

    <div id="final-page" class="section">
        <h1 id="winner-announcement" style="font-size: 3rem;">VICTOR</h1>
        <h3 style="color:white; letter-spacing: 5px;">THE ULTIMATE PRIZE</h3>
        <div class="task-box" id="grand-prize-desc" style="border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1);"></div>
        <p style="text-align:center; font-weight:bold; color:var(--gold); border-top: 1px solid var(--gold); padding-top: 20px;">
            Winner: Choose your submissive now. <br>This prize involves an eventual climax for both players.
        </p>
        <button class="btn" onclick="location.reload()">Reset Session</button>
    </div>
</div>

<audio id="snd-whip" src="https://actions.google.com/sounds/v1/foley/whip_crack.ogg"></audio>

<script>
const catNames = { Impact: "Impact Tools", Sensation: "Sensory Items", Restraints: "Restraints", Gags: "Gags", Blindfolds: "Blindfolds", Toys: "Toys" };
const realmNames = {
    shibari: "Art of Cord",
    escape: "Great Escape",
    tease: "The Brink",
    punish: "Justice & Mercy",
    dare: "The Reckoning",
    soft: "Languid Lust",
    sensory: "Overload",
    inner: "Inner Restraint"
};

let state = {
    p1: { name: "", gender: "", score: 0 },
    p2: { name: "", gender: "", score: 0 },
    masterIdx: 0,
    subIdx: 1,
    currentRound: 1,
    maxRounds: 5,
    inventory: {
        Impact: ["Leather Paddle", "Flogger"],
        Sensation: ["Ice Cubes", "Warm Wax"],
        Restraints: ["Rope", "Cuffs"],
        Gags: ["Ball Gag"],
        Blindfolds: ["Sleep Mask"],
        Toys: ["Vibrator"]
    }
};

window.onload = function() {
    const saved = localStorage.getItem('cage_v5_save');
    if(saved) {
        state = JSON.parse(saved);
        document.getElementById('p1-name').value = state.p1.name;
        document.getElementById('p2-name').value = state.p2.name;
        document.getElementById('max-rounds').value = state.maxRounds;
    }
};

function save() { localStorage.setItem('cage_v5_save', JSON.stringify(state)); }

const grandPrizes = [
    { text: "<b>The Big Adventure:</b> The submissive is bound Blindfolded and Gagged in a way that is not obvious to the pubic. They are then taken outside for a walk, to a nearby park where the Master will play with them and stimulate them to climax. they are to be then led back, still restrained for a second rounds of pleasure Master, after the Master has finished with their toy they are to be kept bound for the evening and used as desired." }
    { text: "<b>The Gilded Eternity (Overnight):</b> The submissive is placed in full-body **[Restraints]** and fitted with **[Blindfolds]**. They are to remain bound until sunrise. The Master will periodically check on them using **[Sensation]**. At dawn, the submissive is released and given an intense session with **[Toys]** until both players reach a synchronised climax." },
    { text: "<b>The Sensory Void:</b> The submissive is bound in total darkness. For 90 minutes, the Master uses **[Sensation]** and **[Impact]** to keep the submissive disoriented. Finally, the submissive is unblindfolded and rewarded with a face-to-face climax under the Master's absolute control." },
    { text: "<b>The Gauntlet of Lust:</b> The submissive is placed in a spread-eagle stasis. The Master uses the entire **[Impact]** arsenal, followed by cooling **[Sensation]**. After multiple edges using **[Toys]**, the Master grants a final, uninhibited release." },
    { text: "<b>The Master's Furniture:</b> The submissive is bound and fitted with **[Gags]**, used as a footrest or seat for the Master while they watch a movie of their choice. Afterwards, they are teased with **[Toys]** until they beg for the climax the Master then provides." },
    { text: "<b>The Coronation of Flesh:</b> The submissive is bound and sensitized with **[Sensation]** for 1 hour. After the body is fully primed, the Master uses **[Toys]** and oral stimulation, ensuring both players reach climax together." }
];

const taskDatabase = {
    shibari: [{ text: "Master, tie the sub’s wrists to their ankles in a tight hogtie using **[Restraints]**. Apply **[Gags]**.", time: 420 }],
    tease: [{ text: "Master, use **[Toys]** to bring the sub to the edge. Stop and apply **[Sensation]** (ice). Repeat 3 times.", time: 480 }],
    punish: [{ text: "Justice: 15 strikes with **[Impact]**. Mercy: Follow with a warm massage using **[Sensation]**.", time: 300 }],
    inner: [{ text: "Submissive, use **[Restraints]** to bind your own wrists together. Then, apply **[Gags]** to yourself.", time: 300 }]
};

function goToInventory() {
    state.p1.name = document.getElementById('p1-name').value || "Player 1";
    state.p2.name = document.getElementById('p2-name').value || "Player 2";
    state.maxRounds = parseInt(document.getElementById('max-rounds').value) || 5;
    save();
    renderInv();
    document.getElementById('setup-page').style.display = 'none';
    document.getElementById('inventory-page').classList.add('active');
}

function renderInv() {
    const container = document.getElementById('inventory-container');
    container.innerHTML = "";
    for(let cat in state.inventory) {
        let h = `<div class="item-list"><h3>${catNames[cat]}</h3><div id="list-${cat}">`;
        state.inventory[cat].forEach(i => {
            h += `<div class="inventory-item"><span>${i}</span><span class="delete-btn" onclick="removeItem('${cat}', '${i}')">×</span></div>`;
        });
        h += `</div><input type="text" id="add-${cat}" placeholder="Add..." onkeydown="if(event.key==='Enter') addItem('${cat}')"></div>`;
        container.innerHTML += h;
    }
}

function addItem(cat) {
    let val = document.getElementById(`add-${cat}`).value;
    if(!val) return;
    state.inventory[cat].push(val);
    save();
    renderInv();
}

function removeItem(cat, val) {
    state.inventory[cat] = state.inventory[cat].filter(i => i !== val);
    save();
    renderInv();
}

function startGame() {
    state.currentRound = 1;
    state.p1.score = 0;
    state.p2.score = 0;
    state.masterIdx = Math.random() > 0.5 ? 0 : 1;
    state.subIdx = state.masterIdx === 0 ? 1 : 0;
    
    const rt = document.getElementById('realm-toggles');
    rt.innerHTML = "";
    for(let key in realmNames) {
        rt.innerHTML += `<label><input type="checkbox" class="realm-box" value="${key}" checked> ${realmNames[key]}</label>`;
    }
    
    updateUI();
    document.getElementById('inventory-page').style.display = 'none';
    document.getElementById('game-page').classList.add('active');
}

function updateUI() {
    document.getElementById('round-display').innerText = `Round: ${state.currentRound}/${state.maxRounds}`;
    document.getElementById('score-display').innerText = `${state.p1.name}: ${state.p1.score} | ${state.p2.name}: ${state.p2.score}`;
    const master = state.masterIdx === 0 ? state.p1 : state.p2;
    const sub = state.subIdx === 0 ? state.p1 : state.p2;
    document.getElementById('role-display').innerText = `Master: ${master.name} | Submissive: ${sub.name}`;
}

function drawTask() {
    clearInterval(state.timer);
    const realms = Array.from(document.querySelectorAll('.realm-box:checked')).map(b => b.value);
    const r = realms[Math.floor(Math.random() * realms.length)];
    const pool = taskDatabase[r] || taskDatabase['shibari'];
    let t = pool[Math.floor(Math.random() * pool.length)];
    let text = t.text;
    for(let cat in catNames) {
        let items = state.inventory[cat];
        let item = items[Math.floor(Math.random() * items.length)];
        text = text.replace(`[${cat}]`, `<b style="color:var(--gold)">${item}</b>`);
    }
    state.currentTask = { ...t, text: text };
    document.getElementById('task-desc').innerHTML = text;
    document.getElementById('timer-display').innerText = format(t.time);
    document.getElementById('master-choice-ui').style.display = 'none';
    document.getElementById('task-ui').style.display = 'block';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('resolve-controls').style.display = 'none';
}

function startTimer() {
    let s = state.currentTask.time;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('resolve-controls').style.display = 'flex';
    state.timer = setInterval(() => {
        s--;
        document.getElementById('timer-display').innerText = format(s);
        if(s <= 0) { clearInterval(state.timer); document.getElementById('snd-whip').play(); }
    }, 1000);
}

function resolveTask(success) {
    clearInterval(state.timer);
    if(success) {
        if(state.subIdx === 0) state.p1.score++; else state.p2.score++;
        let t = state.masterIdx; state.masterIdx = state.subIdx; state.subIdx = t;
    } else { if(state.subIdx === 0) state.p1.score--; else state.p2.score--; }
    
    if(state.currentRound >= state.maxRounds) {
        finish();
    } else {
        state.currentRound++;
        document.getElementById('task-ui').style.display = 'none';
        document.getElementById('master-choice-ui').style.display = 'block';
        updateUI();
    }
}

function finish() {
    document.getElementById('game-page').style.display = 'none';
    document.getElementById('final-page').classList.add('active');
    
    const winner = state.p1.score >= state.p2.score ? state.p1 : state.p2;
    document.getElementById('winner-announcement').innerText = `${winner.name.toUpperCase()} IS THE VICTOR`;
    
    let prize = grandPrizes[Math.floor(Math.random() * grandPrizes.length)];
    let text = prize.text;
    for(let cat in catNames) {
        let item = state.inventory[cat][Math.floor(Math.random() * state.inventory[cat].length)];
        text = text.replace(`[${cat}]`, `<b style="color:var(--gold)">${item}</b>`);
    }
    document.getElementById('grand-prize-desc').innerHTML = text;
}

function triggerSafeword() { location.reload(); }
function format(s) { let m = Math.floor(s/60); let rs = s%60; return `${m}:${rs < 10 ? '0'+rs : rs}`; }
</script>
</body>
</html>
